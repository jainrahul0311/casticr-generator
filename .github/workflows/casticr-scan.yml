# =============================================================================
#  Daily .casticr scan
# =============================================================================
#  For every project in the matrix below, in its OWN parallel job:
#    1. clone the repo (shallow)
#    2. run the CAST Imaging docker analyzer on it
#    3. find the generated <app>.casticr
#    4. upload it as a build artifact named after the app
#
#  Runs every day at 2 PM IST (= 08:30 UTC) and can be started manually.
#
#  ---------------------------------------------------------------------------
#  TO ADD / REMOVE A PROJECT: edit the matrix `include:` list below.
#    - url : the repo's public clone URL
#    - name: the app name passed to the analyzer's -n flag (also the folder
#            the analyzer creates in results, and the artifact name)
#
#  REQUIRED SECRET (repo/org Settings -> Secrets and variables -> Actions):
#    IMAGING_ANALYSIS_KEY   the analysis key passed to the analyzer's -ak flag
#  ---------------------------------------------------------------------------
# =============================================================================

name: Daily .casticr scan

on:
  schedule:
    - cron: '30 8 * * *'   # 08:30 UTC == 14:00 (2 PM) IST, daily
  workflow_dispatch: {}     # allow manual runs from the Actions tab

# This job only needs to read; it clones public repos over HTTPS.
permissions:
  contents: read

# Don't let a new daily run pile on top of one that's still going.
concurrency:
  group: casticr-scan
  cancel-in-progress: false

jobs:
  scan:
    name: scan ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # one project failing must NOT cancel the others
      # max-parallel: 5         # uncomment to cap how many scans run at once
      matrix:
        include:
          # ===== EDIT THIS LIST (url = public clone URL, name = -n app name) ===
          - name: DemoAppPython
            url: https://github.com/public-apis/public-apis
          - name: DemoAppMainframe
            url: https://github.com/aws-samples/aws-mainframe-modernization-carddemo
          - name: DemoAppDOTNET
            url: https://github.com/razorpay/razorpay-dotnet-testapp.git
          - name: DemoAppJEE
            url: https://github.com/spring-petclinic/spring-petclinic-microservices
          # ====================================================================

    steps:
      - name: Clone ${{ matrix.name }}
        env:
          REPO_URL: ${{ matrix.url }}
        run: |
          git clone --depth 1 "$REPO_URL" source

      - name: Run CAST Imaging analyzer
        env:
          ANALYSIS_KEY: ${{ secrets.IMAGING_ANALYSIS_KEY }}
          APP: ${{ matrix.name }}
        run: |
          mkdir -p results
          # Mirrors your local command:
          #   docker run -v <src>:/home/carl/extras/source \
          #              -v <out>:/home/carl/extras/results \
          #              castimaging/imaging-docker-analyzer:latest -ak <key> -n <app>
          docker run --rm \
            -v "${PWD}/source:/home/carl/extras/source" \
            -v "${PWD}/results:/home/carl/extras/results" \
            castimaging/imaging-docker-analyzer:latest \
            -ak "$ANALYSIS_KEY" \
            -n "$APP"

      - name: Locate the .casticr file
        env:
          APP: ${{ matrix.name }}
        run: |
          # The container writes as a different user; take ownership so we can read.
          sudo chown -R "$(id -u):$(id -g)" results || true
          # Layout: results/<app>/<timestamp>/deep-analysis/<app>.casticr
          # The timestamp folder is dynamic, so find it (newest wins if several).
          casticr="$(find "results/$APP" -type f -name '*.casticr' -printf '%T@ %p\n' 2>/dev/null \
                     | sort -nr | head -n1 | cut -d' ' -f2-)"
          if [ -z "$casticr" ]; then
            echo "::error::No .casticr found under results/$APP — did the analysis succeed?"
            echo "results tree:"; find results -maxdepth 4 2>/dev/null | sed 's/^/  /' || true
            exit 1
          fi
          echo "Found: $casticr ($(du -h "$casticr" | cut -f1))"
          echo "CASTICR_PATH=$casticr" >> "$GITHUB_ENV"

      - name: Upload ${{ matrix.name }}.casticr
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.casticr   # stable name -> same artifact name every day
          path: ${{ env.CASTICR_PATH }}
          overwrite: true                     # replace a same-named artifact within the run
          retention-days: 1                   # kept ~1 day; each daily run refreshes it (raise to keep history)
          if-no-files-found: error
