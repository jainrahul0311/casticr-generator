# =============================================================================
#  Scheduled .casticr scan
# =============================================================================
#  For every project in the matrix below, in its OWN parallel job:
#    1. clone the repo (shallow)
#    2. restore this app's cached analyzer extensions (reused across runs)
#    3. run the CAST Imaging docker analyzer on it
#    4. find the generated <app>.casticr
#    5. upload it as a build artifact named after the app
#
#  Runs at 9 PM IST (= 15:30 UTC), Monday-Friday, and can be started manually.
#
#  ---------------------------------------------------------------------------
#  TO ADD / REMOVE A PROJECT: edit the matrix `include:` list below.
#    - url : the repo's public clone URL
#    - name: the app name passed to the analyzer's -n flag (also the folder
#            the analyzer creates in results, and the artifact name)
#
#  REQUIRED SECRET: IMAGING_ANALYSIS_KEY   (passed to the analyzer's -ak flag)
#  ---------------------------------------------------------------------------
# =============================================================================

name: Scheduled .casticr scan

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 15:30 UTC == 21:00 (9 PM) IST, Mon-Fri
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: casticr-scan
  cancel-in-progress: false

jobs:
  scan:
    name: scan ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # one project failing must NOT cancel the others
      # max-parallel: 5         # uncomment to cap how many scans run at once
      matrix:
        include:
          # ===== EDIT THIS LIST (url = public clone URL, name = -n app name) ===
          - name: aws-mainframe-mainframe
            url: https://github.com/aws-samples/aws-mainframe-modernization-carddemo
          - name: razorpay-dotnet
            url: https://github.com/razorpay/razorpay-dotnet-testapp.git
          - name: spring-petclinic-microservices-jee
            url: https://github.com/spring-petclinic/spring-petclinic-microservices
          - name: eshop-csharp-dotnet
            url: https://github.com/dotnet-architecture/eShopModernizing
          - name: guava-jee
            url: https://github.com/google/guava.git
          - name: strix-python
            url: https://github.com/usestrix/strix.git
          - name: nopCommerce
            url: https://github.com/nopSolutions/nopCommerce
          # ====================================================================

    steps:
      - name: Clone ${{ matrix.name }}
        env:
          REPO_URL: ${{ matrix.url }}
        run: |
          git clone --depth 1 "$REPO_URL" source

      # Persist the analyzer's downloaded extensions (/home/carl/extras/extensions)
      # so they're reused on later runs instead of re-downloaded every day.
      # One cache per app (extensions are technology-specific). To force a fresh
      # download, bump the "v1" in the key.
      - name: Restore extensions cache
        uses: actions/cache@v6
        with:
          path: extensions-cache
          key: casticr-extensions-v1-${{ matrix.name }}

      - name: Run CAST Imaging analyzer
        env:
          ANALYSIS_KEY: ${{ secrets.IMAGING_ANALYSIS_KEY }}
          APP: ${{ matrix.name }}
        run: |
          mkdir -p results extensions-cache
          # The analyzer runs as user 'carl' in the container and must write to both mounts.
          chmod 777 results extensions-cache
          # Mirrors your local command, plus the shared extensions mount:
          #   docker run -v <src>:/home/carl/extras/source \
          #              -v <out>:/home/carl/extras/results \
          #              -v <cache>:/home/carl/extras/extensions \
          #              castimaging/imaging-docker-analyzer:latest -ak <key> -n <app>
          docker run --rm \
            -v "${PWD}/source:/home/carl/extras/source" \
            -v "${PWD}/results:/home/carl/extras/results" \
            -v "${PWD}/extensions-cache:/home/carl/extras/extensions" \
            -e IMAGING_CLOUD_URL="https://dev.castimaging.io" \
            castimaging/imaging-docker-analyzer:latest \
            -ak "$ANALYSIS_KEY" \
            -n "$APP"

      - name: Locate the .casticr file
        env:
          APP: ${{ matrix.name }}
        run: |
          # The container wrote as a different user; take ownership so we (and the
          # cache save step) can read results and the extensions cache.
          sudo chown -R "$(id -u):$(id -g)" results extensions-cache || true
          # Layout: results/<app>/<timestamp>/deep-analysis/<app>.casticr
          # The timestamp folder is dynamic, so find it (newest wins if several).
          casticr="$(find "results/$APP" -type f -name '*.casticr' -printf '%T@ %p\n' 2>/dev/null \
                     | sort -nr | head -n1 | cut -d' ' -f2-)"
          if [ -z "$casticr" ]; then
            echo "::error::No .casticr found under results/$APP — did the analysis succeed?"
            echo "results tree:"; find results -maxdepth 4 2>/dev/null | sed 's/^/  /' || true
            exit 1
          fi
          echo "Found: $casticr ($(du -h "$casticr" | cut -f1))"
          echo "CASTICR_PATH=$casticr" >> "$GITHUB_ENV"

      - name: Upload ${{ matrix.name }}.casticr
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}.casticr   # stable name -> same artifact name every day
          path: ${{ env.CASTICR_PATH }}
          overwrite: true
          retention-days: 3
          if-no-files-found: error
